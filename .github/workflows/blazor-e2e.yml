name: Blazor E2E

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  e2e-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Install Playwright browsers and dependencies
        run: pwsh ./tests/WebUI.E2ETests/bin/Release/net10.0/playwright.ps1 install --with-deps

      - name: Start Blazor app
        run: |
          dotnet run \
            --project src/WebApi/Formica.WebApi.csproj \
            --configuration Release \
            --urls=http://127.0.0.1:5080 &
          echo $! > blazorapp.pid

      - name: Wait for app
        run: |
          for i in {1..30}; do
            if curl -f http://127.0.0.1:5080; then
              exit 0
            fi
            sleep 2
          done
          echo "Application did not start in time"
          exit 1

      - name: Run E2E tests
        env:
          BASE_URL: http://127.0.0.1:5080
        run: dotnet test ./tests/WebUI.E2ETests/Formica.WebUI.E2ETests.csproj --no-build --configuration Release

      - name: Stop Blazor app
        if: always()
        run: |
          if [ -f blazorapp.pid ]; then
            kill $(cat blazorapp.pid) || true
          fi